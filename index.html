const UNITS = {
  g:  { base:'g',  factor:1,    label:'g'  },
  kg: { base:'g',  factor:1000, label:'kg' },
  ml: { base:'ml', factor:1,    label:'ml' },
  l:  { base:'ml', factor:1000, label:'l'  },
  un: { base:'un', factor:1,    label:'un' },
  gotas: { base:'gotas', factor:1, label:'gotas' },
};
const UNIT_LIST = ['g','kg','ml','l','un','gotas'];

function toBase(qty, unit){
  const u = UNITS[unit] || UNITS.g;
  return { qty: (Number(qty)||0) * u.factor, base: u.base };
}
function fmtQty(qty, unit){
  qty = Number(qty)||0;
  if(unit==='g' && Math.abs(qty)>=1000) return trimNum(qty/1000)+' kg';
  if(unit==='ml' && Math.abs(qty)>=1000) return trimNum(qty/1000)+' l';
  return trimNum(qty)+' '+unit;
}
function trimNum(n){ return (Math.round(n*100)/100).toString().replace('.', ','); }
function money(v){ v = Number(v)||0; return 'R$ ' + v.toFixed(2).replace('.', ','); }
function normName(s){ return (s||'').trim().toLowerCase(); }
function capitalize(s){ return (s||'').replace(/\b\w/g, c=>c.toUpperCase()); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function fmtDate(iso){
  if(!iso) return '—';
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y}`;
}

async function loadDB(){
  if(!supabaseClient){
    showToast('Configure a SUPABASE_URL e a SUPABASE_ANON_KEY no topo do index.html.', true);
    DB = seedData();
    LOADED = true;
    return;
  }
  try{
    const { data, error } = await supabaseClient.from('app_data').select('data').eq('id','default').maybeSingle();
    if(error) throw error;
    if(data && data.data){ DB = data.data; }
    else { DB = seedData(); await saveDB(); }
  }catch(e){
    console.error(e);
    showToast('Não consegui carregar do banco de dados. Verifique sua internet e a configuração do Supabase.', true);
    DB = seedData();
  }
  LOADED = true;
}
let saveTimer = null;
async function saveDB(){
  if(!supabaseClient) return;
  try{
    const { error } = await supabaseClient.from('app_data').upsert({ id: 'default', data: DB, updated_at: new Date().toISOString() });
    if(error) throw error;
  }catch(e){
    console.error(e);
    showToast('Erro ao salvar no banco de dados.', true);
  }
}

/* Helper used ONLY to display comparisons inside the Preços (market research) tab.
   Never used for recipe cost calculations. */
function pricePerBase(entry){
  const b = toBase(entry.packageQty, entry.packageUnit);
  if(!b.qty) return null;
  return { value: entry.price / b.qty, base: b.base };
}

/* ---------------- Cost engine ----------------
   Regra: o custo de cada ingrediente vem SEMPRE do que foi pago,
   cadastrado na aba Estoque (valor pago + tamanho da embalagem comprada).
   A aba Preços é só pesquisa de mercado e NUNCA entra nesse cálculo. */
function stockFor(name){
  const n = normName(name);
  return DB.stock.find(s => normName(s.name) === n);
}
function stockUnitCost(s){
  if(!s || !s.purchasePrice || !s.purchaseQty) return null;
  const b = toBase(s.purchaseQty, s.unit);
  if(!b.qty) return null;
  return { value: s.purchasePrice / b.qty, base: b.base };
}
function computeIngredientCost(ing){
  const s = stockFor(ing.name);
  const uc = stockUnitCost(s);
  if(!s) return { cost: 0, matched: false, reason: 'sem-estoque' };
  if(!uc) return { cost: 0, matched: false, reason: 'sem-valor-pago' };
  const b = toBase(ing.qty, ing.unit);
  if(b.base !== uc.base) return { cost: 0, matched: false, reason: 'unidade-incompativel' };
  return { cost: uc.value * b.qty, matched: true, unitCost: uc };
}
function computeRecipeCost(recipe){
  let ingredientsCost = 0; let anyUnmatched = false;
  const lines = recipe.ingredients.map(ing => {
    const r = computeIngredientCost(ing);
    ingredientsCost += r.cost;
    if(!r.matched) anyUnmatched = true;
    return { ing, ...r };
  });
  return { ingredientsCost, anyUnmatched, lines };
}
function stockStatus(s){
  if(!s) return null;
  if(s.qty <= 0) return 'critical';
  if(s.minQty && s.qty <= s.minQty) return 'low';
  return 'ok';
}

}

function recipeIngredientsSection(r){
  const groups = {};
  r.ingredients.forEach(ing=>{ const g = ing.group||'Ingredientes'; groups[g]=groups[g]||[]; groups[g].push(ing); });
  const groupHtml = Object.entries(groups).map(([g, items])=>`
    <div class="mb-4">
      <p class="text-xs font-bold uppercase tracking-wide text-on-surface-variant mb-2">${g}</p>
      <div class="space-y-2">
        ${items.map(ing=>{
          const s = stockFor(ing.name);
          const status = stockStatus(s);
          const meta = status?STATUS_META[status]:null;
          const checked = !!VIEW.checked[ing.id];
          return `<label class="flex items-center gap-3 bg-surface-container-lowest rounded-lg border border-outline-variant/60 px-3 py-2.5">
            <input type="checkbox" data-action="toggle-check" data-id="${ing.id}" ${checked?'checked':''} class="w-5 h-5 rounded border-outline text-primary focus:ring-primary"/>
            <div class="flex-1 min-w-0">
              <p class="text-sm font-semibold text-on-surface ${checked?'line-through text-on-surface-variant':''}">${fmtQty(ing.qty,ing.unit)} — ${ing.name}</p>
              <p class="text-xs text-on-surface-variant">${s? `Estoque: ${fmtQty(s.qty,s.unit)}` : 'Sem estoque cadastrado'}</p>
            </div>
            ${meta?`<span class="text-[10px] font-bold px-2 py-1 rounded-full ${meta.bg} ${meta.text}">${meta.label}</span>`:''}
          </label>`;
        }).join('')}
      </div>

  return `<div class="px-5 pt-4">
    ${groupHtml}
    <p class="text-xs font-bold uppercase tracking-wide text-on-surface-variant mb-2 mt-2">Modo de Preparo</p>
    <ol class="space-y-3 mb-6">
      ${r.steps.map((s,i)=>`<li class="flex gap-3"><div class="w-6 h-6 rounded-full bg-primary text-on-primary text-xs font-bold flex items-center justify-center shrink-0">${i+1}</div><p class="text-sm text-on-surface leading-relaxed pt-0.5">${s}</p></li>`).join('')}
    </ol>
    <button data-action="finalize-recipe" data-id="${r.id}" class="w-full bg-primary text-on-primary rounded-lg py-3.5 font-semibold flex items-center justify-center gap-2 mb-2">
      <span class="material-symbols-outlined">check_circle</span> Finalizar Receita
    </button>
    <p class="text-xs text-on-surface-variant text-center pb-6">Isso descontará os ingredientes do seu estoque automaticamente.</p>
  </div>`;
}

function recipeSaleCalcSection(r){
  const { ingredientsCost, lines, anyUnmatched } = computeRecipeCost(r);
  const labor = Number(r.laborCost)||0, pack = Number(r.packagingCost)||0, tax = Number(r.taxPercent)||0, markup = Number(r.markup)||2;
  const costTotal = ingredientsCost + labor + pack;
  const finalPrice = ingredientsCost * markup;
  const taxAmount = finalPrice * (tax/100);
  const netProfit = finalPrice - costTotal - taxAmount;
  const perSlice = r.sliceWeight && r.servings ? finalPrice / r.servings : null;
  const costPerServing = r.servings ? costTotal / r.servings : 0;

  return `<div class="px-5 pt-4 pb-10">
    <div class="bg-surface-container-lowest rounded-xl border border-outline-variant/60 p-4 mb-4">
      <p class="text-xs font-bold uppercase tracking-wide text-on-surface-variant mb-3">Custo dos ingredientes</p>
      <div class="space-y-2">
        ${lines.map(l=>`<div class="flex items-center justify-between text-sm">
          <div class="min-w-0 flex-1">
            <p class="text-on-surface font-medium truncate">${l.ing.name}</p>
            <p class="text-xs text-on-surface-variant">${fmtQty(l.ing.qty,l.ing.unit)} ${l.matched?'· baseado na compra cadastrada no Estoque':(l.reason==='sem-estoque'?'· ingrediente sem item no Estoque':(l.reason==='unidade-incompativel'?'· unidade do Estoque não bate com a da receita':'· falta cadastrar valor pago no Estoque'))}</p>
          </div>
          <p class="font-semibold ${l.matched?'text-on-surface':'text-outline'}">${money(l.cost)}</p>
        </div>`).join('')}
      </div>
      <div class="border-t border-outline-variant/60 mt-3 pt-3 flex justify-between text-sm font-bold">
        <span>Total Insumos</span><span>${money(ingredientsCost)}</span>
      </div>
      ${anyUnmatched?`<p class="text-xs text-secondary mt-2">Algum ingrediente ainda não tem o valor pago cadastrado no Estoque — edite o item lá pra esse cálculo ficar completo.</p>`:''}
    </div>

    <div class="grid grid-cols-3 gap-2 mb-4">
      <div><label class="text-xs text-on-surface-variant">Mão de obra</label><input data-field="laborCost" type="number" step="0.01" min="0" value="${labor}" class="mt-1 w-full rounded-lg border border-outline-variant bg-surface-container-low px-2 py-2 text-sm"/></div>
      <div><label class="text-xs text-on-surface-variant">Embalagem</label><input data-field="packagingCost" type="number" step="0.01" min="0" value="${pack}" class="mt-1 w-full rounded-lg border border-outline-variant bg-surface-container-low px-2 py-2 text-sm"/></div>
      <div><label class="text-xs text-on-surface-variant">Impostos (%)</label><input data-field="taxPercent" type="number" step="0.1" min="0" value="${tax}" class="mt-1 w-full rounded-lg border border-outline-variant bg-surface-container-low px-2 py-2 text-sm"/></div>
    </div>

    <p class="text-xs font-bold uppercase tracking-wide text-on-surface-variant mb-2">Sugestões de preço (sobre o custo dos insumos)</p>
    <div class="grid grid-cols-3 gap-2 mb-4">
      ${[{l:'Margem 30%',f:1.3},{l:'Markup 2x',f:2},{l:'Markup 3x',f:3}].map(o=>`
        <button data-action="apply-markup" data-value="${o.f}" class="bg-surface-container rounded-lg py-2.5 text-center border ${Math.abs(markup-o.f)<0.001?'border-primary bg-primary-container/15':'border-outline-variant/60'}">
          <p class="text-[11px] text-on-surface-variant">${o.l}</p>
          <p class="text-sm font-bold text-on-surface">${money(ingredientsCost*o.f)}</p>
        </button>`).join('')}
    </div>

    <div class="mb-5">
      <div class="flex justify-between text-xs text-on-surface-variant mb-1">
        <span>Ajuste fino de markup</span><span class="font-bold text-primary">${markup.toFixed(1)}x</span>
      </div>
      <input data-field="markup" type="range" min="1" max="5" step="0.1" value="${markup}" class="w-full"/>
    </div>

    <div class="bg-primary text-on-primary rounded-xl p-5 text-center mb-4">
      <p class="text-xs uppercase tracking-wide opacity-80">Preço final de venda sugerido</p>
      <p class="font-serif text-4xl font-bold mt-1">${money(finalPrice)}</p>
      ${perSlice?`<p class="text-xs opacity-80 mt-1">≈ ${money(perSlice)} por porção</p>`:''}
    </div>

    <div class="bg-surface-container-lowest rounded-xl border border-outline-variant/60 p-4 space-y-1.5 text-sm mb-6">
      <div class="flex justify-between"><span class="text-on-surface-variant">Insumos</span><span>${money(ingredientsCost)}</span></div>
      <div class="flex justify-between"><span class="text-on-surface-variant">Mão de obra</span><span>${money(labor)}</span></div>
      <div class="flex justify-between"><span class="text-on-surface-variant">Embalagem</span><span>${money(pack)}</span></div>
      <div class="flex justify-between"><span class="text-on-surface-variant">Impostos (${tax}%)</span><span>${money(taxAmount)}</span></div>
      <div class="flex justify-between border-t border-outline-variant/60 pt-1.5 mt-1.5"><span class="text-on-surface-variant">Custo por porção</span><span>${money(costPerServing)}</span></div>
      <div class="flex justify-between font-bold text-primary"><span>Lucro líquido estimado</span><span>${money(netProfit)}</span></div>
    </div>

    <button data-action="save-calc" data-id="${r.id}" class="w-full bg-primary text-on-primary rounded-lg py-3.5 font-semibold flex items-center justify-center gap-2">
      <span class="material-symbols-outlined">save</span> Salvar cálculo na receita
    </button>
  </div>`;
}

function pricesListView(){
  const q = normName(VIEW.priceQuery);
  const filtered = DB.prices.filter(p=>!q || normName(p.ingredientName).includes(q));
  const groups = {};
  filtered.forEach(p=>{ groups[p.ingredientName]=groups[p.ingredientName]||[]; groups[p.ingredientName].push(p); });

  const groupsHtml = Object.entries(groups).map(([name, entries])=>{
    const withPb = entries.map(e=>({e, pb: pricePerBase(e)})).sort((a,b)=> (a.pb?a.pb.value:9e9) - (b.pb?b.pb.value:9e9));
    const cheapestId = withPb[0] && withPb[0].e.id;
    return `<div class="mb-4">
      <p class="font-serif text-base font-semibold text-on-surface mb-2">${name}</p>
      <div class="space-y-2">
        ${withPb.map(({e,pb})=>{
          const isBest = e.id===cheapestId;
          const per100 = pb ? (pb.base==='un' ? `${money(pb.value)}/un` : `${money(pb.value*100)} / 100${pb.base}`) : '';
          return `<button data-action="edit-price" data-id="${e.id}" class="w-full text-left ${isBest?'bg-ok-stock-bg/70 border-ok-stock/40':'bg-surface-container-lowest border-outline-variant/60'} border rounded-lg p-3 flex items-center gap-3">

              <div class="flex items-center gap-1.5">
                <p class="text-sm font-semibold text-on-surface truncate">${e.store}</p>
                ${isBest?'<span class="text-[10px] font-bold px-1.5 py-0.5 rounded-full bg-ok-stock text-white shrink-0">Melhor preço</span>':''}
              </div>
              <p class="text-xs text-on-surface-variant">${e.brand?`${e.brand} · `:''}Atualizado em ${fmtDate(e.updatedAt)} ${per100?`· ${per100}`:''}</p>
            </div>
            <p class="font-serif text-lg font-bold text-on-surface shrink-0">${money(e.price)}<span class="text-xs font-sans font-normal text-on-surface-variant"> /${fmtQty(e.packageQty,e.packageUnit)}</span></p>
          </button>`;
        }).join('')}
      </div>

  }).join('');

  return `${header('Meus Preços','Pesquisas de preço por ingrediente.')}

}

/* ---------------- Event handling ---------------- */
function attachHandlers(){
  const app = document.getElementById('app');
  const nav = document.getElementById('bottomnav');

  nav.onclick = (e)=>{
    const btn = e.target.closest('[data-action="nav"]');
    if(!btn) return;
    const tab = btn.dataset.tab;
    go({ tab, screen: tab==='recipes'?'list':'list' });
  };

  app.addEventListener('click', onAppClick);
  app.addEventListener('submit', onAppSubmit);
  app.addEventListener('input', onAppInput);
  app.addEventListener('change', onAppChange);
}

function onAppClick(e){
  const t = e.target.closest('[data-action]');
  if(!t) return;
  const action = t.dataset.action;

  if(action==='new-recipe'){ VIEW.editId=null; go({tab:'recipes', screen:'form'}); }
  else if(action==='edit-recipe'){ VIEW.editId=t.dataset.id; go({tab:'recipes', screen:'form'}); }
  else if(action==='cancel-form'){ go({tab:'recipes', screen: VIEW.editId? 'detail':'list', recipeId: VIEW.editId||VIEW.recipeId}); }
  else if(action==='open-recipe'){ go({tab:'recipes', screen:'detail', recipeId:t.dataset.id, calcSection:'ingredients', checked:{}}); }
  else if(action==='back-to-list'){ go({tab:'recipes', screen:'list'}); }
  else if(action==='calc-section'){ go({calcSection:t.dataset.section}); }
  else if(action==='toggle-check'){ VIEW.checked[t.dataset.id] = t.checked; }
  else if(action==='delete-recipe'){
    if(confirm('Tem certeza que deseja excluir esta receita?')){
      DB.recipes = DB.recipes.filter(r=>r.id!==t.dataset.id); saveDB(); go({tab:'recipes', screen:'list'}); showToast('Receita excluída.');
    }
  }
  else if(action==='add-ing-row'){ document.getElementById('ing-rows').insertAdjacentHTML('beforeend', ingredientRow({id:uid(),group:'',name:'',qty:'',unit:'g'})); }
  else if(action==='add-step-row'){ const rows=document.getElementById('step-rows'); rows.insertAdjacentHTML('beforeend', stepRow('', rows.children.length)); }
  else if(action==='remove-row'){ t.closest('.ing-row,.step-row').remove(); }
  else if(action==='finalize-recipe'){ finalizeRecipe(t.dataset.id); }
  else if(action==='apply-markup'){ setRecipeField(VIEW.recipeId, 'markup', parseFloat(t.dataset.value)); render(); }
  else if(action==='save-calc'){ saveDB(); showToast('Cálculo salvo na receita! 💚'); }

  else if(action==='new-stock'){ VIEW.editId=null; go({tab:'stock', screen:'form'}); }
  else if(action==='edit-stock'){ VIEW.editId=t.dataset.id; go({tab:'stock', screen:'form'}); }
  else if(action==='back-stock'){ go({tab:'stock', screen:'list'}); }
  else if(action==='delete-stock'){
    if(confirm('Remover este item do estoque?')){ DB.stock = DB.stock.filter(s=>s.id!==t.dataset.id); saveDB(); go({tab:'stock', screen:'list'}); showToast('Item removido.'); }
  }

  else if(action==='new-price'){ VIEW.editId=null; go({tab:'prices', screen:'form'}); }
  else if(action==='edit-price'){ VIEW.editId=t.dataset.id; go({tab:'prices', screen:'form'}); }
  else if(action==='back-prices'){ go({tab:'prices', screen:'list'}); }
  else if(action==='delete-price'){
    if(confirm('Remover este preço?')){ DB.prices = DB.prices.filter(p=>p.id!==t.dataset.id); saveDB(); go({tab:'prices', screen:'list'}); showToast('Preço removido.'); }
  }
}

function onAppInput(e){
  if(e.target.id==='stock-search'){ VIEW.stockQuery = e.target.value; renderKeepFocus('stock-search'); }
  if(e.target.id==='price-search'){ VIEW.priceQuery = e.target.value; renderKeepFocus('price-search'); }
  if(e.target.dataset.field && VIEW.tab==='recipes' && VIEW.screen==='detail'){
    const field = e.target.dataset.field;
    const val = parseFloat(e.target.value)||0;
    setRecipeField(VIEW.recipeId, field, val);
    if(field==='markup'){
      // live-update just the price/slider label without full rerender jank
      render();
    }
  }
}
function onAppChange(e){
  if(e.target.dataset.field){
    const field = e.target.dataset.field;
    const val = parseFloat(e.target.value)||0;
    setRecipeField(VIEW.recipeId, field, val);
    saveDB();
  }
}
function renderKeepFocus(id){
  render();
  const el = document.getElementById(id);
  if(el){ el.focus(); const v=el.value; el.value=''; el.value=v; }
}

function setRecipeField(id, field, val){
  const r = DB.recipes.find(x=>x.id===id);
  if(r) r[field] = val;
}

function onAppSubmit(e){
  e.preventDefault();
  if(e.target.id==='recipe-form') return submitRecipeForm(e.target);
  if(e.target.id==='stock-form') return submitStockForm(e.target);
  if(e.target.id==='price-form') return submitPriceForm(e.target);
}

function submitRecipeForm(form){
  const fd = new FormData(form);
  const ingRows = [...form.querySelectorAll('.ing-row')];
  const ingredients = ingRows.map(row=>({
    id: row.dataset.rowId || uid(),
    group: row.querySelector('[name=ing-group]').value.trim(),
    name: capitalize(row.querySelector('[name=ing-name]').value.trim()),
    qty: parseFloat(row.querySelector('[name=ing-qty]').value)||0,
    unit: row.querySelector('[name=ing-unit]').value,
  })).filter(i=>i.name);
  const stepRows = [...form.querySelectorAll('.step-row textarea')];
  const steps = stepRows.map(s=>s.value.trim()).filter(Boolean);

  const data = {
    emoji: fd.get('emoji')||'🍰',
    name: fd.get('name').trim(),
    servings: parseInt(fd.get('servings'))||1,
    sliceWeight: fd.get('sliceWeight')?parseFloat(fd.get('sliceWeight')):null,
    laborCost: parseFloat(fd.get('laborCost'))||0,
    packagingCost: parseFloat(fd.get('packagingCost'))||0,
    taxPercent: parseFloat(fd.get('taxPercent'))||0,
    ingredients, steps,
  };
  if(VIEW.editId){
    const r = DB.recipes.find(x=>x.id===VIEW.editId);
    Object.assign(r, data);
    saveDB(); showToast('Receita atualizada! 💚'); go({tab:'recipes', screen:'detail', recipeId:r.id, calcSection:'ingredients'});
  } else {
    const r = { id: uid(), markup: 2.5, ...data };
    DB.recipes.push(r);
    saveDB(); showToast('Receita salva com carinho! 💚'); go({tab:'recipes', screen:'detail', recipeId:r.id, calcSection:'ingredients', checked:{}});
  }
}

function submitStockForm(form){
  const fd = new FormData(form);
  const data = {
    name: capitalize(fd.get('name').trim()),
    qty: parseFloat(fd.get('qty'))||0,
    unit: fd.get('unit'),
    minQty: fd.get('minQty')?parseFloat(fd.get('minQty')):0,
    purchasePrice: parseFloat(fd.get('purchasePrice'))||0,
    purchaseQty: parseFloat(fd.get('purchaseQty'))||0,
  };
  if(VIEW.editId){
    Object.assign(DB.stock.find(s=>s.id===VIEW.editId), data);
    showToast('Estoque atualizado!');
  } else {
    DB.stock.push({ id: uid(), ...data });
    showToast('Item adicionado ao estoque!');
  }
  saveDB(); go({tab:'stock', screen:'list'});
}

function submitPriceForm(form){
  const fd = new FormData(form);
  const data = {
    ingredientName: capitalize(fd.get('ingredientName').trim()),
    brand: fd.get('brand').trim(),
    store: fd.get('store').trim(),
    price: parseFloat(fd.get('price'))||0,
    packageQty: parseFloat(fd.get('packageQty'))||1,
    packageUnit: fd.get('packageUnit'),
    updatedAt: fd.get('updatedAt') || todayISO(),
  };
  if(VIEW.editId){
    Object.assign(DB.prices.find(p=>p.id===VIEW.editId), data);
    showToast('Preço atualizado!');
  } else {
    DB.prices.push({ id: uid(), ...data });
    showToast('Preço anotado!');
  }
  saveDB(); go({tab:'prices', screen:'list'});
}

function finalizeRecipe(recipeId){
  const r = DB.recipes.find(x=>x.id===recipeId);
  if(!r) return;
  let warnings = [];
  r.ingredients.forEach(ing=>{
    const s = stockFor(ing.name);
    if(!s){ warnings.push(`${ing.name} (sem estoque cadastrado)`); return; }
    const need = toBase(ing.qty, ing.unit);
    const have = toBase(s.qty, s.unit);
    if(need.base !== have.base){ warnings.push(`${ing.name} (unidade incompatível)`); return; }
    const newQtyBase = Math.max(0, have.qty - need.qty);
    if(have.qty < need.qty) warnings.push(`${ing.name} (estoque insuficiente)`);
    // convert back to stock's original unit
    const factor = UNITS[s.unit].factor;
    s.qty = Math.round((newQtyBase/factor)*1000)/1000;
  });
  saveDB();
  VIEW.checked = {};
  render();
  if(warnings.length){
    showToast(`Receita feita! Atenção: ${warnings.join(', ')}.`, true);
  } else {
    showToast('Receita feita com carinho! Estoque atualizado. 💚');
  }
}

/* ---------------- Init ---------------- */
(async function init(){
  render();
  await loadDB();
  render();
})();
</script>
